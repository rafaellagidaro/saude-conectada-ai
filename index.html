<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthMonitor | Core_Engine_v3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --accent: #00f2ff;
            --danger: #ff0055;
            --success: #00ff88;
            --warning: #f1c40f;
            --surface: rgba(15, 23, 42, 0.9);
        }

        body {
            background: #020617;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Efeito de Grade de Fundo (Grid) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* Cabeçalho Estilo Sistema Operativo */
        .sys-header {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: space-between;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .status-blink {
            color: var(--success);
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            padding: 30px;
            flex-grow: 1;
        }

        .card-monitor {
            background: var(--surface);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-monitor::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .header-label {
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Display de Números Grandes */
        .display-main {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 30px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .metric label { font-size: 0.6rem; display: block; margin-top: 5px; opacity: 0.7; }

        /* Zona de Inputs */
        .input-zone {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--accent);
            padding: 12px;
            text-align: center;
            font-family: 'JetBrains Mono';
            font-size: 1rem;
        }

        button {
            grid-column: span 3;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 30px var(--accent);
        }

        /* Console de Logs IA */
        .console {
            background: #000;
            border: 1px solid #1e293b;
            color: var(--success);
            font-size: 0.9rem;
            overflow-y: auto;
            padding: 20px;
        }

        .typewriter {
            line-height: 1.6;
        }

        .critical { color: var(--danger); font-weight: bold; text-shadow: 0 0 5px var(--danger); }
        .stable { color: var(--success); }

    </style>
</head>
<body>

    <header class="sys-header">
        <div>HEALTH_OS // MODULE: CORE_ANALYTICS</div>
        <div class="status-blink">● ENGINES_ONLINE</div>
    </header>

    <main class="dashboard-grid">
        <div
