<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaúdePro AI | Enterprise Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> </head>
<body>
    <nav class="sidebar">
        <div class="logo">SAÚDE<b>PRO</b> <small>v2.0</small></div>
        <button class="nav-item active" data-tab="dash">📊 Dashboard</button>
        <button class="nav-item" data-tab="ai">🧠 Motor de IA</button>
        <button class="nav-item" data-tab="logs">🔐 Auditoria SQL</button>
        <div class="spacer"></div>
        <button id="btn-contraste">👁️ Acessibilidade</button>
    </nav>

    <main class="content">
        <header>
            <h1>Monitorização em Tempo Real</h1>
            <div class="badge">SISTEMA ATIVO</div>
        </header>

        <section class="dashboard-grid">
            <div class="card">
                <h3>Pressão Arterial (Sistólica)</h3>
                <div class="stat-value" id="val-pressao">118 <small>mmHg</small></div>
                <div class="trend up">↑ 2.1% (IA Predict)</div>
            </div>

            <div class="card">
                <h3>Glicémia Médiana</h3>
                <div class="stat-value" id="val-glicemia">94 <small>mg/dL</small></div>
                <div class="trend stable">STABLE</div>
            </div>

            <div class="card wide">
                <h3>Análise Preditiva (ML Engine)</h3>
                <canvas id="aiChart"></canvas>
            </div>
        </section>

        <button id="btn-sos-trigger">🆘 SOS</button>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
