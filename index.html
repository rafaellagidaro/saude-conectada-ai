<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Health Monitor - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-grid">
    <div class="card-monitor">
        <div class="header">
            <span class="dot"></span> LIVE TELEMETRY
        </div>
        
        <div class="display-main">
            <div class="metric">
                <label>SYS/DIA</label>
                <div class="stat-value" id="val-pressao">--/--</div>
            </div>
            <div class="metric">
                <label>GLUCOSE</label>
                <div class="stat-value" id="val-glicemia">--</div>
            </div>
        </div>

        <div class="input-zone">
            <input type="number" id="sis" oninput="liveUpdate()" placeholder="SYS">
            <input type="number" id="dia" oninput="liveUpdate()" placeholder="DIA">
            <input type="number" id="mgdl" oninput="liveUpdate()" placeholder="GLU">
            <button class="btn-primary" onclick="processarIA()">EXECUTE ANALYTICS</button>
        </div>
    </div>

    <div class="card-monitor console">
        <div class="header">IA DIAGNOSTIC ENGINE v3.0</div>
        <div id="console-out" class="typewriter">Aguardando telemetria...</div>
    </div>
</div>
    
    <main>
        <section id="aba-registro" class="aba active">
            <h2>Registrar Sinais Vitais</h2>
            <p>Os dados serão validados pelo motor C++ e auditados via SHA-256.</p>
            
            <label>Pressão Sistólica (mmHg):</label>
            <input type="number" id="sis" placeholder="Ex: 120">
            
            <label>Pressão Diastólica (mmHg):</label>
            <input type="number" id="dia" placeholder="Ex: 80">
            
            <label>Glicémia (mg/dL):</label>
            <input type="number" id="mgdl" placeholder="Ex: 95">

            <button onclick="enviarDadosSaude()">Gravar Dados no Sistema</button>
            <div id="res-registro" style="margin-top:15px; font-weight:bold;"></div>
        </section>

        <section id="aba-agendar" class="aba">
            <h2>Agendamento Ético</h2>
            <p>Limite de 10 consultas por dia por profissional.</p>
            
            <label>Data da Consulta:</label>
            <input type="date" id="data-consulta">
            
            <button onclick="agendarConsulta()">Verificar Disponibilidade e Agendar</button>
            <div id="res-agendar" style="margin-top:15px;"></div>
        </section>

        <section id="aba-historico" class="aba">
            <h2>Histórico e Auditoria</h2>
            <div id="lista-historico">Carregando dados...</div>
        </section>
    </main>

    <button class="btn-sos-floating" onclick="ativarSOS()">SOS</button>

    <script>
        const API_URL = "http://localhost:3000/api";

        // Alternar entre abas
        function mostrarAba(id) {
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'aba-historico') carregarHistorico();
        }

        // 1. Enviar Dados para o Backend
        async function enviarDadosSaude() {
            const dados = {
                user_id: 1, // Simulando usuário logado
                tipo: 'Geral',
                sis: document.getElementById('sis').value,
                dia: document.getElementById('dia').value,
                mgdl: document.getElementById('mgdl').value
            };

            const res = await fetch(`${API_URL}/log-saude`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            const resultado = await res.json();
            const div = document.getElementById('res-registro');
            
            if(res.ok) {
                div.style.color = "green";
                div.innerHTML = `✅ ${resultado.message} <br><small>Hash SHA-256: ${resultado.audit_id}</small>`;
            } else {
                div.style.color = "red";
                div.innerHTML = `❌ Erro: ${resultado.error}`;
            }
        }

        // 2. Agendar Consulta (Com verificação de limite)
        async function agendarConsulta() {
            const dados = {
                medico_id: 101, // Exemplo de médico fixo
                paciente_id: 1,
                data_consulta: document.getElementById('data-consulta').value
            };

            const res = await fetch(`${API_URL}/agendar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            const resultado = await res.json();
            const div = document.getElementById('res-agendar');

            if(res.ok) {
                div.innerHTML = `<p style="color:green;">✅ ${resultado.success}</p>`;
            } else {
                div.innerHTML = `<p style="color:red;">⚠️ ${resultado.error}</p>`;
            }
        }

        // 3. Carregar Histórico
        async function carregarHistorico() {
            const res = await fetch(`${API_URL}/historico/1`);
            const dados = await res.json();
            const lista = document.getElementById('lista-historico');

            lista.innerHTML = dados.map(item => `
                <div style="border-bottom: 1px solid #ddd; padding: 10px;">
                    <strong>${new Date(item.data_registro).toLocaleDateString()}</strong> - 
                    Pressão: ${item.v_sistolica}/${item.v_diastolica} | Glicémia: ${item.v_mgdl}mg/dL
                    <br><small style="color:gray;">Audit Hash: ${item.assinatura_hash}</small>
                </div>
            `).join('');
        }

        // SOS e Contraste
        function ativarSOS() { alert("🚨 Emergência! Localização enviada para o hospital mais próximo."); }
        function toggleContraste() { document.body.classList.toggle('alto-contraste'); }
    </script>
</body>
</html>
