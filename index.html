<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde Conectada Pro - AI</title>
    <style>
        :root {
            --primary: #2980b9; --secondary: #27ae60; --danger: #e74c3c;
            --bg: #f4f7f6; --text: #2c3e50; --card: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .top-nav { background: var(--primary); padding: 1rem; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; }
        .top-nav button { background: transparent; border: 1px solid white; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .top-nav button.active { background: white; color: var(--primary); }
        main { max-width: 900px; margin: 20px auto; padding: 20px; }
        .aba { display: none; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .aba.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-sos { position: fixed; bottom: 20px; right: 20px; width: 70px; height: 70px; background: var(--danger); color: white; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.5); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        .card-ia { border-left: 5px solid var(--secondary); background: #e8f5e9; padding: 15px; margin: 15px 0; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button onclick="mudarAba('resumo')" class="btn-nav active">Resumo</button>
        <button onclick="mudarAba('diario')" class="btn-nav">Diário</button>
        <button onclick="mudarAba('consultas')" class="btn-nav">Consultas</button>
        <button onclick="mudarAba('farmacia')" class="btn-nav">Farmácia</button>
        <button onclick="mudarAba('exames')" class="btn-nav">IA Insights</button>
    </nav>

    <main>
        <section id="resumo" class="aba active">
            <h2>Bem-vindo ao Painel de Saúde</h2>
            <div class="card-ia">
                <strong>💡 Insight da IA:</strong> Os teus sinais vitais foram validados pelo motor C++ e estão estáveis.
            </div>
            <p>Selecione uma opção no menu acima para gerir a sua saúde.</p>
        </section>

        <section id="diario" class="aba">
            <h2>Registrar Sinais Vitais</h2>
            <label>Pressão Sistólica:</label>
            <input type="number" id="sis" placeholder="Ex: 120">
            <label>Glicémia (mg/dL):</label>
            <input type="number" id="mgdl" placeholder="Ex: 90">
            <button onclick="alert('Enviando para o Motor C++ e Node.js...') " style="background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px;">Salvar com Auditoria SHA-256</button>
        </section>

        <section id="exames" class="aba">
            <h2>Análise Preditiva de IA</h2>
            <div id="checkup-sugestao">
                <p>A carregar tendências do histórico...</p>
                <progress style="width: 100%;"></progress>
            </div>
        </section>

        </main>

    <button class="btn-sos" onclick="ativarSOS()">SOS</button>

    <script>
        function mudarAba(id) {
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function ativarSOS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    alert(`🚨 ALERTA SOS ENVIADO!\nLocalização: Lat ${pos.coords.latitude}, Long ${pos.coords.longitude}\nServiços de emergência notificados.`);
                });
            } else {
                alert("🚨 SOS Ativado! Localização não disponível.");
            }
        }
        <div id="chat-icon" onclick="toggleChat()" style="position: fixed; bottom: 100px; right: 20px; background: #27ae60; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;">
    💬
</div>

<div id="chat-window" style="display: none; position: fixed; bottom: 170px; right: 20px; width: 300px; height: 400px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); flex-direction: column; overflow: hidden; z-index: 1000; border: 1px solid #ddd;">
    <div style="background: #27ae60; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between;">
        <span>Assistente OMS (AI)</span>
        <span onclick="toggleChat()" style="cursor:pointer">✖</span>
    </div>
    <div id="chat-content" style="flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; background: #f9f9f9;">
        <p style="background: #eee; padding: 10px; border-radius: 10px;">Olá! Sou o assistente baseado nas diretrizes da <strong>OMS</strong>. Como posso ajudar na sua saúde hoje?</p>
    </div>
    <div style="padding: 10px; border-top: 1px solid #eee; display: flex;">
        <input type="text" id="chat-input" placeholder="Pergunte sobre pressão, sal..." style="flex: 1; border: none; outline: none;">
        <button onclick="enviarChat()" style="background: none; border: none; color: #27ae60; font-weight: bold; cursor: pointer;">Enviar</button>
    </div>
</div>

<script>
    // LÓGICA DO CHATBOT BASEADO NA OMS
    function toggleChat() {
        const chat = document.getElementById('chat-window');
        chat.style.display = chat.style.display === 'none' ? 'flex' : 'none';
    }

    function enviarChat() {
        const input = document.getElementById('chat-input');
        const content = document.getElementById('chat-content');
        if(!input.value) return;

        // User message
        content.innerHTML += `<p style="text-align: right; color: #2980b9;"><b>Tu:</b> ${input.value}</p>`;
        
        const pergunta = input.value.toLowerCase();
        let resposta = "Desculpe, não encontrei essa informação nos protocolos atuais da OMS. Recomendo consultar um médico presencialmente.";

        // Base de Conhecimento OMS (Simulada)
        if(pergunta.includes("pressão") || pergunta.includes("hipertensão")) {
            resposta = "<strong>OMS diz:</strong> A hipertensão é definida como pressão sistólica ≥140 mmHg. Reduza o sal para menos de 5g por dia.";
        } else if(pergunta.includes("sal") || pergunta.includes("sódio")) {
            resposta = "<strong>OMS diz:</strong> Reduzir o consumo de sódio para <2g/dia (5g de sal) reduz a pressão arterial e o risco de doenças cardiovasculares.";
        } else if(pergunta.includes("atividade") || pergunta.includes("exercício")) {
            resposta = "<strong>OMS diz:</strong> Adultos devem fazer pelo menos 150-300 minutos de atividade física aeróbica de intensidade moderada por semana.";
        } else if(pergunta.includes("diabetes") || pergunta.includes("açúcar")) {
            resposta = "<strong>OMS diz:</strong> Uma dieta saudável, atividade física e evitar o tabaco podem prevenir ou retardar o diabetes tipo 2.";
        }

        setTimeout(() => {
            content.innerHTML += `<p style="background: #e8f5e9; padding: 10px; border-radius: 10px; border-left: 4px solid #27ae60;">${resposta}</p>`;
            content.scrollTop = content.scrollHeight;
        }, 500);

        input.value = "";
    }
</script>
    </script>
</body>
</html>
